version: "3"
services:
  lldap:
    image: nitnelave/lldap:latest
    container_name: lldap
    ports:
      - "3890:3890"
      - "17170:17170"
    environment:
      - LLDAP_HTTP_PORT=17170
      - LLDAP_LDAP_PORT=3890
      - LLDAP_LDAP_BASE_DN=dc=modelmatrix,dc=local
      - LLDAP_LDAP_USER_PASS=dayangdayang
      - LLDAP_JWT_SECRET=ModelMatrixLLDAPSecretModelMatrixLLDAPSecret
      - LLDAP_DISABLE_PASSWORD_COMPLEXITY=true
    volumes:
      - lldap_data:/data
    restart: unless-stopped
    user: "root:root"

volumes:
  lldap_data:
    driver: local

